name: Deploy Hugo site to OVH

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Read Hugo version
        id: hugo-version
        run: echo "version=$(cat .hugo-version)" >> $GITHUB_OUTPUT

      - name: Cache Hugo binary
        id: cache-hugo
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/hugo
          key: hugo-${{ steps.hugo-version.outputs.version }}

      - name: Install Hugo
        if: steps.cache-hugo.outputs.cache-hit != 'true'
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${{ steps.hugo-version.outputs.version }}/hugo_extended_${{ steps.hugo-version.outputs.version }}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Build Hugo site
        run: hugo --minify

      - name: Deploy using SFTP
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ftp.cluster130.hosting.ovh.net
          port: 22
          user: ${{ secrets.OVH_FTP_USER }}
          pass: ${{ secrets.OVH_FTP_PASSWORD }}
          localDir: public/
          remoteDir: /home/benousf/docs/
          options: '--verbose'
